name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev && uv pip install -e .

      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ \
            --cov=sema \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=85 \
            -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        run: |
          base=${{ github.event.pull_request.base.sha }}
          head=${{ github.event.pull_request.head.sha }}
          failed=0
          for sha in $(git rev-list "$base".."$head"); do
            if ! git log -1 --format='%B' "$sha" | grep -q '^Signed-off-by: '; then
              echo "FAIL: $(git log -1 --format='%h %s' "$sha") — missing Signed-off-by"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "All commits must include a Signed-off-by line."
            echo "Use: git commit -s -m \"your message\""
            exit 1
          fi
          echo "All commits have DCO sign-off."

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev && uv pip install -e .

      - name: Check imports
        run: uv run python -c "import sema; print('OK')"
